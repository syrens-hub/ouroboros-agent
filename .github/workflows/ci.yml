name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.node-version }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache node_modules, npm and vitest
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            node_modules
            web/node_modules
            ~/.npm
            node_modules/.cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json', 'web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install web dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: cd web && npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm run audit:ci || true

      - name: Secrets scan
        run: npm run secrets:scan || true

      - name: Check runtime data bloat
        run: |
          if [ -d .ouroboros ]; then
            SIZE=$(du -sm .ouroboros | cut -f1)
            echo ".ouroboros size: ${SIZE}MB"
            if [ "$SIZE" -gt 100 ]; then
              echo "::warning::.ouroboros directory is larger than 100MB (${SIZE}MB). Run 'npm run cleanup' to prune old backups and checkpoints."
            fi
          fi

      - name: Test with coverage
        run: npm run test:coverage 2>&1 | tee test-coverage.log
        continue-on-error: true

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-node-${{ matrix.node-version }}
          path: test-coverage.log

      - name: Build web
        run: cd web && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ouroboros-agent:test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == 20 && success()
        with:
          name: coverage-report
          path: coverage/
