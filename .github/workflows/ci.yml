name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-node20:
    name: Test (Node 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            node_modules
            web/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-20-${{ hashFiles('package-lock.json', 'web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-20-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install web dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: cd web && npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm run audit:ci || true

      - name: Secrets scan
        run: npm run secrets:scan || true

      - name: Check runtime data bloat
        run: |
          if [ -d .ouroboros ]; then
            SIZE=$(du -sm .ouroboros | cut -f1)
            echo ".ouroboros size: ${SIZE}MB"
            if [ "$SIZE" -gt 100 ]; then
              echo "::warning::.ouroboros directory is larger than 100MB (${SIZE}MB). Run 'npm run cleanup' to prune old backups and checkpoints."
            fi
          fi

      - name: Test (no coverage)
        run: |
          npm test -- --run 2>&1 | tee test-output-node20.log
          echo "${PIPESTATUS[0]}" > test-exit-code-node20.txt

      - name: Upload test output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-output-node20
          path: test-output-node20.log

      - name: Test with coverage
        run: |
          npm run test:coverage 2>&1 | tee coverage-output-node20.log
          echo "${PIPESTATUS[0]}" > coverage-exit-code-node20.txt

      - name: Upload coverage output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-output-node20
          path: coverage-output-node20.log

      - name: Build web
        run: cd web && npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ouroboros-agent:test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-node20
          path: coverage/

      - name: Show test output tail
        if: always()
        run: |
          echo "=== Test output tail (Node 20) ==="
          tail -n 50 test-output-node20.log || true
          echo "=== Coverage output tail (Node 20) ==="
          tail -n 50 coverage-output-node20.log || true

      - name: Assert tests passed
        run: |
          FAIL=0
          if [ -f test-exit-code-node20.txt ]; then
            exit_code=$(cat test-exit-code-node20.txt)
            if [ "$exit_code" != "0" ]; then
              echo "Tests failed with exit code $exit_code"
              FAIL=1
            fi
          fi
          if [ -f coverage-exit-code-node20.txt ]; then
            exit_code=$(cat coverage-exit-code-node20.txt)
            if [ "$exit_code" != "0" ]; then
              echo "Coverage tests failed with exit code $exit_code"
              FAIL=1
            fi
          fi
          if [ "$FAIL" = "1" ]; then
            exit 1
          fi

