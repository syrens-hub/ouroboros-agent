{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ouroboros-agent.fullname" . }}-secrets
  labels:
    {{- include "ouroboros-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_API_KEY: {{ .Values.secrets.llmApiKey | quote }}
  FALLBACK_LLM_API_KEY: {{ .Values.secrets.fallbackLlmApiKey | quote }}
  WEB_API_TOKEN: {{ .Values.secrets.webApiToken | quote }}
  DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
{{- end }}
