apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ouroboros-agent
  namespace: ouroboros
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: ouroboros.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ouroboros-agent
                port:
                  number: 80
