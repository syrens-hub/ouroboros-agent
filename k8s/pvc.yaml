apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ouroboros-data
  namespace: ouroboros
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ouroboros-skills
  namespace: ouroboros
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
