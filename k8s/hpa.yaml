apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ouroboros-agent
  namespace: ouroboros
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ouroboros-agent
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
