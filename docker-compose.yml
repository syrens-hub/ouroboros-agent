version: "3.8"

services:
  ouroboros:
    build: .
    container_name: ouroboros-agent
    ports:
      - "${OUROBOROS_WEB_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./.ouroboros:/app/.ouroboros
      - ./skills:/app/skills
      - ./.env:/app/.env:ro
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: ouroboros-postgres
    command: >
      postgres
      -c log_statement=ddl
      -c log_min_duration_statement=1000
      -c log_destination=stderr
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ouroboros}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ouroboros}
      POSTGRES_DB: ${POSTGRES_DB:-ouroboros}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ouroboros} -d ${POSTGRES_DB:-ouroboros}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
